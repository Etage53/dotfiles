###############################################################################
#                           Code Syntax Highlighting                          #
###############################################################################

# Find one you like at: https://github.com/alecthomas/chroma/blob/master/styles.

code_syntax_highlight = "onedark"

###############################################################################
#                                 Base Colors                                 #
###############################################################################

#-- Full Screen
full_screen_fg = "#00ee00"
full_screen_bg = "#000000"

#-- Gradient
# Note: This currently only supports two colors.
gradient_color = ["#720000", "#ff0000"]

#-- File Panel
file_panel_fg = "#00ee00"
file_panel_bg = "#000000"
file_panel_border = "#00ee00"
file_panel_border_active = "#00ee00"
file_panel_top_directory_icon = "#00ee00"
file_panel_top_path = "#00ee00"
file_panel_item_selected_fg = "#000000"
file_panel_item_selected_bg = "#00ee00"

#-- Footer
footer_fg = "#00ee00"
footer_bg = "#000000"
footer_border = "#00ee00"
footer_border_active = "#00ee00"

#-- Sidebar
sidebar_fg = "#00ee00"
sidebar_bg = "#000000"
sidebar_title = "#00ee00"
sidebar_border = "#00ee00"
sidebar_border_active = "#00ee00"
sidebar_item_selected_fg = "#000000"
sidebar_item_selected_bg = "#00ee00"
sidebar_divider = "#00ee00"

#-- Modals
modal_fg = "#00ee00"
modal_bg = "#000000"
modal_border_active = "#00ee00"
modal_cancel_fg = "#00ee00"
modal_cancel_bg = "#000000"
modal_confirm_fg = "#00ee00"
modal_confirm_bg = "#000000"

#-- Help Menu
help_menu_hotkey = "#ff8d34"
